<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body onload="applySavedTheme()">

<header>
  <h2>Admin Panel</h2>
  <button onclick="logout()">Logout</button>
</header>

<section class="container">

  <div class="card">
    <h2>Add Doctor</h2>

    <form id="doctorForm">
      <input type="text" id="name" placeholder="Doctor Name" required>
      <input type="text" id="hospital" placeholder="Hospital" required>
      <input type="text" id="specialization" placeholder="Specialization" required>
      <button type="submit">Add Doctor</button>
    </form>
  </div>

  <div class="card">
    <h2>Doctors List</h2>
    <div id="doctorList"></div>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
