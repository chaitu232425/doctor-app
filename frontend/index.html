<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIT-AP Doctor Appointment System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="splash">
  <img src="vitap-logo.png" class="splash-logo">
</div>

<header>
  <div class="header-left">
    <img src="vitap-logo.png" class="header-logo">
    <div>
      <h2>VIT-AP University</h2>
      <span>Doctor Appointment System</span>
    </div>
  </div>
  <button onclick="toggleDarkMode()" class="dark-toggle">🌙</button>
</header>

<section class="home">
  <div class="home-card">
    <h1>Select Role</h1>
    <div class="role-buttons">
      <a href="doctor.html" class="primary-btn">Doctor</a>
      <a href="patient.html" class="secondary-btn">Patient</a>
    </div>
  </div>
</section>

<footer>
  <img src="vitap-logo.png">
  <p>© 2026 VIT-AP University | Amaravati, Andhra Pradesh</p>
</footer>

<script src="script.js"></script>
<script>
window.onload = function(){
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
  },2000);
  applySavedTheme();
}
</script>

</body>
</html>
